<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>To Do Liste</title>
</head>
<body>
    <header class="header">
        <h1 class="header__title">Ma To Do Liste</h1>
    </header>
    <main class="main">
        <form action="" class="main__form">
            <label for="" class="main__form__label">Tâche à entrer</label>
            <input type="text" class="main__form__input" id="main__form__input" placeholder="Entrer la tâche" required>
            <button class="main__form__button__ajouter" id="main__form__button__add">Ajouter</button>
        </form>
        <ol class="main__liste" id="main__liste">
        </ol>
        <div id="error"></div>
        <div class="main__button__filter" id="main__button__filter">

        </div>
    </main>
    <footer class="footer">
        <div class="cookie-banner" id="cookie-banner">
            <p>Ce site utilise des cookies fonctionnels pour garantir la meilleure expérience.</p>
            <button class="footer__button" id="button_cookie">J'accepte</button>

        </div>
    </footer>
    
</body>
</html>
